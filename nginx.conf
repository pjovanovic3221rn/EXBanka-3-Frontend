server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Route auth requests to the extracted auth-service
    location /api/v1/auth/ {
        proxy_pass http://auth-service:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route employee endpoints to the extracted employee-service
    location = /api/v1/permissions {
        proxy_pass http://employee-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/employees {
        proxy_pass http://employee-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/actuaries {
        proxy_pass http://employee-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route client endpoints to the extracted client-service
    location /api/v1/clients {
        proxy_pass http://client-service:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route firma/sifre endpoints to account-service
    location /api/v1/firme {
        proxy_pass http://account-service:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/sifre-delatnosti {
        proxy_pass http://account-service:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/currencies {
        proxy_pass http://account-service:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route account create (custom HTTP) to account-service
    location /api/v1/accounts/create {
        proxy_pass http://account-service:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route account endpoints to account-service
    location /api/v1/accounts {
        proxy_pass http://account-service:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route card endpoints to account-service
    location /api/v1/cards {
        proxy_pass http://account-service:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route transfer endpoints to transfer-service
    location /api/v1/transfers {
        proxy_pass http://transfer-service:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route payment endpoints to payment-service
    location /api/v1/payments {
        proxy_pass http://payment-service:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/prenos {
        proxy_pass http://payment-service:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/recipients {
        proxy_pass http://payment-service:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route exchange endpoints to exchange-service
    location /api/v1/exchanges {
        proxy_pass http://exchange-service:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/listings {
        proxy_pass http://exchange-service:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/portfolio {
        proxy_pass http://exchange-service:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/exchange {
        proxy_pass http://exchange-service:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route loan endpoints to loan-service
    location /api/v1/loans {
        proxy_pass http://loan-service:8089;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy swagger endpoints to backend
    location /swagger {
        proxy_pass http://backend:8080;
    }

    # Vue SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
